<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員註冊</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 背景動畫 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(120, 219, 226, 0.3) 0%, transparent 50%);
            animation: backgroundFloat 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes backgroundFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-10px) rotate(1deg); }
            66% { transform: translateY(10px) rotate(-1deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15),
                        0 8px 32px rgba(31, 38, 135, 0.1);
            padding: 40px;
            max-width: 480px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideIn 0.8s ease-out;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            border-radius: 20px 20px 0 0;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .header h1 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { filter: brightness(1); }
            to { filter: brightness(1.1); }
        }

        .header .icon {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 10px;
            animation: iconBounce 1s ease-in-out;
        }

        @keyframes iconBounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .time-display {
            color: #7f8c8d;
            font-size: 14px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.8);
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid rgba(102, 126, 234, 0.2);
            animation: timePulse 2s ease-in-out infinite;
        }

        @keyframes timePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
            50% { box-shadow: 0 0 0 4px rgba(102, 126, 234, 0); }
        }

        .form-group {
            margin-bottom: 28px;
            position: relative;
            animation: formSlideIn 0.6s ease-out forwards;
            opacity: 0;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }

        @keyframes formSlideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #34495e;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group label i {
            color: #667eea;
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .form-group input::placeholder {
            color: #bdc3c7;
            transition: color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1),
                        0 8px 25px rgba(102, 126, 234, 0.15);
            background: white;
            transform: translateY(-2px);
        }

        .form-group input:focus::placeholder {
            color: #95a5a6;
        }

        .form-group input.error {
            border-color: #e74c3c;
            background-color: rgba(231, 76, 60, 0.05);
            animation: errorShake 0.5s ease-in-out;
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            font-weight: 500;
            animation: errorSlideIn 0.3s ease-out;
        }

        .error-message.show {
            display: block;
        }

        @keyframes errorSlideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .button-group {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            justify-content: space-between;
            animation: buttonSlideIn 0.8s ease-out 0.4s both;
        }

        @keyframes buttonSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-back {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            color: white;
            box-shadow: 0 4px 15px rgba(127, 140, 141, 0.3);
        }

        .btn-back:hover {
            background: linear-gradient(135deg, #7f8c8d, #6c7b7d);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(127, 140, 141, 0.4);
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:hover:not(:disabled) {
            background: linear-gradient(135deg, #5a67d8, #6b46c1);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 25px 0;
            animation: loadingFadeIn 0.3s ease-out;
        }

        @keyframes loadingFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loading p {
            color: #667eea;
            font-weight: 500;
            margin-top: 12px;
            font-size: 14px;
        }

        .spinner {
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 響應式設計 */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }

            .header h1 {
                font-size: 28px;
            }

            .button-group {
                flex-direction: column;
                gap: 12px;
            }

            .btn {
                padding: 14px 20px;
            }
        }

        /* 成功動畫 */
        .success-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(39, 174, 96, 0.3);
            font-weight: 600;
            animation: successSlideDown 0.5s ease-out;
            z-index: 1000;
        }

        @keyframes successSlideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-100%);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>會員註冊</h1>
            <div class="time-display" id="timeDisplay"></div>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="name">
                    <i class="fas fa-user"></i>
                    姓名
                </label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="請輸入姓名（僅限中文）"
                    required
                >
                <div class="error-message" id="nameError"></div>
            </div>

            <div class="form-group">
                <label for="account">
                    <i class="fas fa-at"></i>
                    帳號
                </label>
                <input
                    type="text"
                    id="account"
                    name="account"
                    placeholder="請輸入帳號"
                    required
                >
                <div class="error-message" id="accountError"></div>
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i>
                    密碼
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="請輸入密碼（6個數字）"
                    required
                >
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在處理您的註冊資料...</p>
            </div>

            <div class="button-group">
                <button type="button" class="btn btn-back" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i> 返回
                </button>
                <button type="submit" class="btn btn-submit" id="submitBtn">
                    <i class="fas fa-paper-plane"></i> 送出
                </button>
            </div>
        </form>
    </div>

    <script>
        // Google Apps Script Web App URL - 請替換為你的App Script部署URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyACtMKVngQdstQIvWwhxhG5AdvCZElmCdKvW8kQLWguHxLCWESDlVPjm13Ae_lEgDd/exec';

        // 更新時間顯示
        function updateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('timeDisplay').textContent = 
                `${year}-${month}-${date} ${hours}:${minutes}:${seconds}`;
        }

        // 初始化時間
        updateTime();
        setInterval(updateTime, 1000);

        // 驗證姓名（只允許中文）
        function validateName(name) {
            const chineseRegex = /^[\u4e00-\u9fa5]+$/;
            return chineseRegex.test(name);
        }

        // 驗證密碼（只允許6個數字）
        function validatePassword(password) {
            const passwordRegex = /^\d{6}$/;
            return passwordRegex.test(password);
        }

        // 清除錯誤訊息
        function clearErrorMessages() {
            document.getElementById('nameError').classList.remove('show');
            document.getElementById('accountError').classList.remove('show');
            document.getElementById('passwordError').classList.remove('show');
            
            document.getElementById('name').classList.remove('error');
            document.getElementById('account').classList.remove('error');
            document.getElementById('password').classList.remove('error');
        }

        // 顯示成功訊息
        function showSuccessMessage(message) {
            // 移除現有的成功訊息
            const existingMessage = document.querySelector('.success-message');
            if (existingMessage) {
                existingMessage.remove();
            }

            // 創建新的成功訊息
            const successDiv = document.createElement('div');
            successDiv.className = 'success-message';
            successDiv.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            document.body.appendChild(successDiv);

            // 2秒後自動移除
            setTimeout(() => {
                if (successDiv.parentNode) {
                    successDiv.style.animation = 'successSlideDown 0.5s ease-out reverse';
                    setTimeout(() => successDiv.remove(), 500);
                }
            }, 2000);
        }

// 顯示錯誤訊息（加在 showSuccessMessage 函數下面）
function showError(fieldId, message) {
    const input = document.getElementById(fieldId);
    const errorDiv = document.getElementById(fieldId + 'Error');
    
    input.classList.add('error');
    errorDiv.textContent = message;
    errorDiv.classList.add('show');
}

        // 姓名輸入實時驗證
        document.getElementById('name').addEventListener('input', function(e) {
            const value = e.target.value;
            if (value && !validateName(value)) {
                const cleanedValue = value.replace(/[^\u4e00-\u9fa5]/g, '');
                e.target.value = cleanedValue;
            }
        });

        // 密碼輸入實時驗證
        document.getElementById('password').addEventListener('input', function(e) {
            let value = e.target.value;
            // 只允許數字
            value = value.replace(/[^\d]/g, '');
            // 限制為6個數字
            if (value.length > 6) {
                value = value.substring(0, 6);
            }
            e.target.value = value;
        });

        // 表單提交
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // 清除所有錯誤訊息
            clearErrorMessages();

            // 取得表單資料
            const name = document.getElementById('name').value.trim();
            const account = document.getElementById('account').value.trim();
            const password = document.getElementById('password').value;

            // 驗證
            let isValid = true;

            if (!name) {
                showError('name', '請輸入姓名');
                isValid = false;
            } else if (!validateName(name)) {
                showError('name', '姓名只能輸入中文字');
                isValid = false;
            }

            if (!account) {
                showError('account', '請輸入帳號');
                isValid = false;
            }

            if (!password) {
                showError('password', '請輸入密碼');
                isValid = false;
            } else if (!validatePassword(password)) {
                showError('password', '密碼必須為6個數字');
                isValid = false;
            }

            if (!isValid) return;

            // 顯示載入動畫
            document.getElementById('loading').style.display = 'block';
            document.getElementById('submitBtn').disabled = true;

            try {
                // 準備時間戳
                const now = new Date();
                const timestamp = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;

                // 發送資料到Google Apps Script
                const response = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({
        timestamp: timestamp,
        name: name,
        account: account,
        password: password
    })
});

                const result = await response.json();

                if (result.success) {
                    showSuccessMessage('註冊成功！歡迎加入我們');
                    // 重置表單
                    setTimeout(() => {
                        document.getElementById('registerForm').reset();
                    }, 2000);
                } else if (result.isDuplicate) {
                    showError('account', '此帳號已重複');
                    document.getElementById('account').focus();
                } else {
                    alert('註冊失敗，請稍後重試：' + (result.error || '未知錯誤'));
                }
            } catch (error) {
                console.error('錯誤:', error);
                console.error('錯誤詳情:', error.message);
                console.error('錯誤類型:', error.name);
                
                // 檢查是否為網路錯誤
                if (error.name === 'TypeError' && error.message.includes('fetch')) {
                    alert('網路連線錯誤，請檢查網路連線或稍後重試');
                } else if (error.message.includes('CORS')) {
                    alert('跨域請求錯誤，請檢查 Google Apps Script 部署設定');
                } else {
                    alert('提交失敗：' + error.message + '\n\n請檢查 Google Apps Script URL 是否正確設置');
                }
            } finally {
                // 隱藏載入動畫
                document.getElementById('loading').style.display = 'none';
                document.getElementById('submitBtn').disabled = false;
            }
        });

        // 返回按鈕
        function goBack() {
            // 返回上一頁
            window.history.back();
            // 或者返回到index.html
            // window.location.href = 'index.html';
        }
    </script>
</body>
</html>
