<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入頁面</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 25px;
            font-weight: bold;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        #time {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 20px;
        }
        #center {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 25px;
            font-weight: bold;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
            outline: none;
        }
        button {
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            font-size: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        #register {
            background-color: #28a745;
            color: white;
        }
        #login {
            background-color: #007bff;
            color: white;
        }
        #admin {
            background-color: #6c757d;
            color: white;
            width: 100%;
            margin-top: 20px;
        }
        .button-row {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .button-row button {
            flex: 1;
            margin: 0 5px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease-in;
        }
        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease-out;
        }
        .modal h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.5em;
        }
        .modal input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .modal input:focus {
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
            outline: none;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #submitAdmin {
            background-color: #007bff;
            color: white;
        }
        #submitAdmin:hover {
            background-color: #0056b3;
        }
        #cancelAdmin {
            background-color: #6c757d;
            color: white;
        }
        #cancelAdmin:hover {
            background-color: #545b62;
        }
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            #center {
                font-size: 1.8em;
            }
            button {
                padding: 12px 20px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="time"></div>
        <div id="center">義大社工科</div>
        <input type="text" id="account" placeholder="帳號">
        <input type="password" id="password" placeholder="密碼" maxlength="6" pattern="[0-9]{6}">
        <div class="button-row">
            <button id="register">註冊</button>
            <button id="login">登入</button>
        </div>
        <button id="admin">後台管理</button>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h2>後台管理登入</h2>
            <input type="text" id="adminAccount" placeholder="帳號">
            <input type="password" id="adminPassword" placeholder="密碼">
            <div class="modal-buttons">
                <button id="submitAdmin">送出</button>
                <button id="cancelAdmin">取消</button>
            </div>
        </div>
    </div>
    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleString('zh-TW');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 限制密碼輸入只能6位數字
        document.getElementById('password').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
        });

        // 註冊按鈕點擊事件
        document.getElementById('register').addEventListener('click', function() {
            window.location.href = 'register.html';
        });

        // 後台管理按鈕點擊事件
        document.getElementById('admin').addEventListener('click', function() {
            document.getElementById('adminModal').style.display = 'block';
            document.getElementById('adminAccount').value = '';
            document.getElementById('adminPassword').value = '';
            document.getElementById('adminAccount').focus();
        });

        // 送出按鈕點擊事件
        document.getElementById('submitAdmin').addEventListener('click', function() {
            const adminAccount = document.getElementById('adminAccount').value.trim();
            const adminPassword = document.getElementById('adminPassword').value.trim();

            if (!adminAccount || !adminPassword) {
                alert('請輸入帳號和密碼');
                return;
            }

            if (adminAccount !== '2046') {
                alert('帳號密碼錯誤');
                document.getElementById('adminAccount').value = '';
                document.getElementById('adminPassword').value = '';
                document.getElementById('adminAccount').focus();
                return;
            }

            if (adminPassword !== '100661') {
                alert('密碼錯誤');
                document.getElementById('adminPassword').value = '';
                document.getElementById('adminPassword').focus();
                return;
            }

            document.getElementById('adminModal').style.display = 'none';
            window.location.href = 'deleloper.html';
        });

        // 取消按鈕點擊事件
        document.getElementById('cancelAdmin').addEventListener('click', function() {
            document.getElementById('adminModal').style.display = 'none';
        });

        // 按 Escape 鍵關閉對話框
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('adminModal').style.display = 'none';
            }
        });

        // 點擊對話框外側關閉
        window.addEventListener('click', function(e) {
            const modal = document.getElementById('adminModal');
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });

// 登入按鈕點擊事件
document.getElementById('login').addEventListener('click', async function() {
    const account = document.getElementById('account').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!account || !password) {
        alert('請輸入帳號和密碼');
        return;
    }

    try {
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyACtMKVngQdstQIvWwhxhG5AdvCZElmCdKvW8kQLWguHxLCWESDlVPjm13Ae_lEgDd/exec';

        // 準備表單數據（Google Apps Script 要求）
        const formData = new FormData();
        formData.append('action', 'login');
        formData.append('account', account);
        formData.append('password', password);

        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: formData
        });

        const result = await response.json();
        console.log('後端返回的結果:', result);

        if (result.success) {
            // ✅ 存帳號到 localStorage，跳轉主頁
            localStorage.setItem('account', account);
            window.location.href = 'main.html';
        } else {
            alert('帳號或密碼錯誤\n\n返回信息: ' + JSON.stringify(result));
        }

    } catch (error) {
        alert('登入失敗：' + error.message);
    }
});

    </script>
</body>
</html>
</body>
</html>
