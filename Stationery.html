<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>文具登記</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #f5f0eb;
      --cream:   #fdf8f3;
      --warm1:   #e8a87c;
      --warm2:   #d4724a;
      --warm3:   #b85c38;
      --sage:    #7aab8a;
      --sage2:   #5d9170;
      --sky:     #7bafc9;
      --blush:   #f2c4a8;
      --ink:     #3a2a1e;
      --ink2:    #6b4c3b;
      --muted:   #a08878;
      --border:  #e2d0c0;
      --white:   #ffffff;
      --shadow:  rgba(90,50,20,0.10);
      --radius:  16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 17px; /* ← 基準字體放大 */
      background: var(--bg);
      background-image:
        radial-gradient(circle at 10% 15%, rgba(232,168,124,0.15) 0%, transparent 50%),
        radial-gradient(circle at 88% 82%, rgba(122,171,138,0.12) 0%, transparent 45%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 14px 60px;
      color: var(--ink);
    }

    /* 浮動裝飾 */
    .deco {
      position: fixed;
      pointer-events: none;
      opacity: 0.10;
      animation: floatY 7s ease-in-out infinite;
      z-index: 0;
      font-size: 1.4rem;
    }
    .deco:nth-child(1) { top:7%;  left:3%;  animation-delay:0s;   font-size:1.7rem; }
    .deco:nth-child(2) { top:22%; right:4%; animation-delay:2s;   font-size:1.1rem; }
    .deco:nth-child(3) { top:58%; left:2%;  animation-delay:4s;   font-size:1rem;   }
    .deco:nth-child(4) { top:74%; right:3%; animation-delay:1.5s; font-size:1.5rem; }
    .deco:nth-child(5) { top:42%; right:2%; animation-delay:3.5s; font-size:1.1rem; }
    @keyframes floatY {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-12px) rotate(7deg); }
    }

    /* ── Header 卡片 ── */
    header {
      width: 100%;
      max-width: 480px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 15px 20px;
      margin-bottom: 14px;
      box-shadow: 0 4px 20px var(--shadow);
      position: relative; z-index: 1;
      animation: slideDown 0.5s ease both;
    }
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .site-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--warm2);
    }

    .title-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--warm1), var(--warm3));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      box-shadow: 0 2px 8px rgba(212,114,74,0.35);
      flex-shrink: 0;
    }

    .btn-return {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.82rem;
      font-weight: 700;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: #fdf5ee;
      color: var(--muted);
      transition: all 0.2s;
    }
    .btn-return:hover {
      background: var(--blush);
      border-color: var(--warm1);
      color: var(--warm3);
      transform: translateX(-2px);
    }

    .header-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #clock {
      font-size: 0.92rem;
      color: var(--muted);
      font-family: 'Zen Maru Gothic', sans-serif;
    }

    #welcome {
      font-size: 0.95rem;
      color: var(--warm2);
      font-weight: 600;
    }

    /* ── 主要表單卡片 ── */
    .form-card {
      width: 100%;
      max-width: 480px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 6px 28px var(--shadow);
      z-index: 1;
      animation: slideDown 0.5s 0.1s ease both;
    }

    .form-card-header {
      background: linear-gradient(135deg, #fef0e4, #fde8d4);
      padding: 14px 20px;
      border-bottom: 1.5px solid var(--border);
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--warm2);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .form-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* ── 欄位 ── */
    .field { display: flex; flex-direction: column; gap: 6px; }

    .field-label {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--ink2);
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .field-label .req { color: var(--warm3); }

    input[type="text"],
    input[type="search"],
    textarea {
      background: #fdf8f3;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--ink);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 1rem;
      padding: 12px 15px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input:focus, textarea:focus {
      border-color: var(--warm1);
      box-shadow: 0 0 0 3px rgba(232,168,124,0.18);
      background: var(--white);
    }

    textarea {
      min-height: 88px;
      resize: vertical;
      line-height: 1.6;
    }

    /* 搜尋欄位包裝 */
    .search-wrap { position: relative; }
    .search-wrap .search-icon {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
    }
    .search-wrap input { padding-left: 38px; }

    /* 清除按鈕 */
    .clear-btn {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer;
      font-size: 1rem;
      color: var(--muted);
      padding: 2px;
      display: none;
    }
    .clear-btn.show { display: block; }

    /* ── 搜尋結果框 ── */
    .suggestions-box {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      max-height: 220px;
      overflow-y: auto;
      padding: 8px;
      display: none;
      box-shadow: 0 4px 16px var(--shadow);
      margin-top: 4px;
    }
    .suggestions-box.open { display: block; }

    .suggestion-item {
      padding: 11px 14px;
      border-radius: 10px;
      margin-bottom: 4px;
      cursor: pointer;
      font-size: 1rem;
      color: var(--ink);
      background: #fdf5ee;
      border: 1px solid transparent;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .suggestion-item:last-child { margin-bottom: 0; }
    .suggestion-item:hover {
      background: var(--blush);
      border-color: var(--warm1);
      transform: translateX(3px);
    }
    .suggestion-item .item-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--warm1);
      flex-shrink: 0;
    }

    .no-result {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* 已選文具標籤 */
    .selected-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, var(--warm1), var(--warm2));
      color: #fff;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 1rem;
      font-weight: 600;
    }

    /* 數量輸入驗證提示 */
    .qty-hint {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .qty-hint.err { color: var(--warm3); font-weight: 600; }

    /* ── 訊息 ── */
    .form-msg {
      font-size: 0.82rem;
      padding: 9px 14px;
      border-radius: 10px;
      display: none;
    }
    .form-msg.show { display: block; }
    .form-msg.ok  { background: #edf6f0; color: var(--sage2); border: 1px solid #c5dece; }
    .form-msg.err { background: #fde8e4; color: var(--warm3); border: 1px solid #f5c5bb; }

    /* ── 按鈕 ── */
    .form-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 20px 20px;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 700;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:active { transform: scale(0.97); }

    .btn-submit {
      background: linear-gradient(135deg, var(--sage), var(--sage2));
      color: #fff;
      box-shadow: 0 4px 14px rgba(93,145,112,0.3);
    }
    .btn-submit:hover { box-shadow: 0 6px 20px rgba(93,145,112,0.4); transform: translateY(-2px); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-back {
      background: #f5ede4;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .btn-back:hover { background: var(--blush); color: var(--warm3); border-color: var(--warm1); }

    /* 分隔線 */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 4px 0;
    }
  </style>
</head>
<body>

<div class="deco">✏️</div>
<div class="deco">📝</div>
<div class="deco">🌿</div>
<div class="deco">📎</div>
<div class="deco">🌸</div>

<!-- ─── Header ─── -->
<header>
  <div class="header-top">
    <div class="site-title">
      <div class="title-icon">✏️</div>
      義大社工科｜文具登記
    </div>
    <button class="btn-return" onclick="window.location.href='main.html'">← 返回</button>
  </div>
  <div class="header-info">
    <span id="clock">載入中…</span>
    <span id="welcome"></span>
  </div>
</header>

<!-- ─── 表單卡片 ─── -->
<div class="form-card">
  <div class="form-card-header">📋 填寫登記資料</div>

  <div class="form-body">

    <!-- 關鍵字搜尋 -->
    <div class="field">
      <div class="field-label">🔍 搜尋文具 <span class="req">*</span></div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="search" id="keyword" placeholder="輸入關鍵字，例如：原子筆、便利貼" autocomplete="off"/>
        <button class="clear-btn" id="clear-btn" onclick="clearSearch()">✕</button>
      </div>
      <!-- 搜尋結果 -->
      <div class="suggestions-box" id="suggestions"></div>
    </div>

    <div class="divider"></div>

    <!-- 已選文具（點選後出現） -->
    <div class="field" id="field-item" style="display:none">
      <div class="field-label">🖊 已選文具</div>
      <div id="selected-tag" class="selected-tag">
        <span id="selected-name"></span>
        <span style="cursor:pointer;opacity:0.7" onclick="clearSearch()">✕</span>
      </div>
    </div>

    <!-- 數量 -->
    <div class="field" id="field-qty" style="display:none">
      <div class="field-label">🔢 數量 <span class="req">*</span></div>
      <input type="text" id="quantity" inputmode="numeric" placeholder="請輸入數量（僅限正整數）" maxlength="5"/>
      <span class="qty-hint" id="qty-hint">僅限輸入正整數，不可輸入文字或小數點</span>
    </div>

    <!-- 備註 -->
    <div class="field" id="field-note" style="display:none">
      <div class="field-label">📝 備註</div>
      <textarea id="notes" placeholder="可填寫用途、尺寸、顏色或其他說明（選填）"></textarea>
    </div>

    <!-- 訊息 -->
    <div class="form-msg" id="form-msg"></div>

  </div><!-- /form-body -->

  <!-- 按鈕 -->
  <div class="form-actions">
    <button class="btn btn-submit" id="btn-submit" onclick="submitOrder()">✅ 送出登記</button>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyACtMKVngQdstQIvWwhxhG5AdvCZElmCdKvW8kQLWguHxLCWESDlVPjm13Ae_lEgDd/exec';
  const account = localStorage.getItem('account');
  let selectedItem = '';
  let currentUserName = '';

  /* ── 時鐘 ── */
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleDateString('zh-TW') + '　' +
      now.toLocaleTimeString('zh-TW', { hour12: false });
  }
  setInterval(updateClock, 1000);
  updateClock();

  /* ── 登入檢查 ── */
  if (!account) {
    alert('請先登入');
    window.location.href = 'index.html';
  }

  /* ── 載入姓名 ── */
  async function loadUserName() {
    try {
      const res  = await fetch(`${SCRIPT_URL}?account=${encodeURIComponent(account)}`);
      const data = await res.json();
      currentUserName = data.name || account;
      document.getElementById('welcome').textContent = '👋 ' + currentUserName;
    } catch {
      currentUserName = account;
      document.getElementById('welcome').textContent = '👋 ' + account;
    }
  }
  loadUserName();

  let searchTimer = null;
  let allStationery = []; // 快取所有文具，減少 API 呼叫

  /* ── 頁面載入時預先抓取所有文具 ── */
  async function preloadStationery() {
    try {
      const res  = await fetch(`${SCRIPT_URL}?action=getStationeryDB&query=`, { cache: 'no-store' });
      const json = await res.json();
      allStationery = json.data || [];
    } catch { allStationery = []; }
  }
  preloadStationery();

  /* ── 模糊比對：支援部分字、任意順序、跳字搜尋 ── */
  function fuzzyMatch(item, kw) {
    if (!kw) return true;
    const itemLower = item.toLowerCase();
    const kwLower   = kw.toLowerCase();

    // 1. 完整包含（最優先）
    if (itemLower.includes(kwLower)) return true;

    // 2. 每個字元都在字串中（跳字搜尋）
    let idx = 0;
    for (const ch of kwLower) {
      const found = itemLower.indexOf(ch, idx);
      if (found === -1) return false;
      idx = found + 1;
    }
    return true;
  }

  /* ── 計算相關度分數（越高越相關）── */
  function relevanceScore(item, kw) {
    const itemLower = item.toLowerCase();
    const kwLower   = kw.toLowerCase();
    if (itemLower === kwLower)           return 100; // 完全相同
    if (itemLower.startsWith(kwLower))  return 90;  // 開頭符合
    if (itemLower.includes(kwLower))    return 80;  // 包含關鍵字
    return 60; // 跳字符合
  }

  /* ── 搜尋欄位事件（防抖 200ms）── */
  document.getElementById('keyword').addEventListener('input', function () {
    const kw = this.value.trim();
    const clearBtn = document.getElementById('clear-btn');
    clearBtn.classList.toggle('show', kw.length > 0);

    clearTimeout(searchTimer);

    const box = document.getElementById('suggestions');
    if (!kw) { box.classList.remove('open'); box.innerHTML = ''; return; }

    // 先用本地快取即時顯示
    doSearch(kw);

    // 200ms 後再打 API 確保資料最新
    searchTimer = setTimeout(async () => {
      try {
        const res  = await fetch(`${SCRIPT_URL}?action=getStationeryDB&query=`, { cache: 'no-store' });
        const json = await res.json();
        allStationery = json.data || [];
        doSearch(document.getElementById('keyword').value.trim());
      } catch { /* 靜默，用快取 */ }
    }, 200);
  });

  function doSearch(kw) {
    if (!kw) return;
    const box = document.getElementById('suggestions');

    // 模糊比對 + 排序
    const results = allStationery
      .filter(item => fuzzyMatch(item, kw))
      .map(item => ({ item, score: relevanceScore(item, kw) }))
      .sort((a, b) => b.score - a.score)
      .map(r => r.item)
      .slice(0, 20);

    renderSuggestions(results, kw);
  }

  function renderSuggestions(items, kw) {
    const box = document.getElementById('suggestions');
    box.innerHTML = '';

    if (!items.length) {
      box.innerHTML = `<div class="no-result">😅 找不到「${kw}」相關文具<br><span style="font-size:0.75rem;opacity:0.7">試試看其他關鍵字</span></div>`;
    } else {
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'suggestion-item';
        // 高亮關鍵字
        const highlighted = item.replace(
          new RegExp(`(${kw.split('').map(c => c.replace(/[.*+?^${}()|[\]\\]/g,'\\')).join('|')})`, 'g'),
          '<mark style="background:rgba(232,168,124,0.4);color:var(--warm3);border-radius:3px;padding:0 1px;font-weight:700">$1</mark>'
        );
        div.innerHTML = `<span class="item-dot"></span><span>${highlighted}</span>`;
        div.addEventListener('click', () => selectItem(item));
        box.appendChild(div);
      });
    }
    box.classList.add('open');
  }

  function selectItem(item) {
    selectedItem = item;
    document.getElementById('keyword').value = item;
    document.getElementById('suggestions').classList.remove('open');
    document.getElementById('suggestions').innerHTML = '';
    document.getElementById('selected-name').textContent = item;

    // 顯示下方欄位（動畫效果）
    ['field-item', 'field-qty', 'field-note'].forEach((id, i) => {
      const el = document.getElementById(id);
      el.style.display = 'flex';
      el.style.opacity = '0';
      el.style.transform = 'translateY(8px)';
      setTimeout(() => {
        el.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        el.style.opacity = '1';
        el.style.transform = 'translateY(0)';
      }, i * 80);
    });

    document.getElementById('quantity').focus();
  }

  function clearSearch() {
    selectedItem = '';
    document.getElementById('keyword').value = '';
    document.getElementById('suggestions').classList.remove('open');
    document.getElementById('suggestions').innerHTML = '';
    document.getElementById('clear-btn').classList.remove('show');
    ['field-item', 'field-qty', 'field-note'].forEach(id => {
      document.getElementById(id).style.display = 'none';
    });
    document.getElementById('quantity').value = '';
    document.getElementById('notes').value = '';
    hideMsg();
  }

  /* ── 數量驗證（只允許正整數）── */
  document.getElementById('quantity').addEventListener('input', function () {
    this.value = this.value.replace(/[^0-9]/g, '');
    const hint = document.getElementById('qty-hint');
    const v = parseInt(this.value);
    if (!this.value) {
      hint.className = 'qty-hint';
      hint.textContent = '僅限輸入正整數，不可輸入文字或小數點';
    } else if (v <= 0) {
      hint.className = 'qty-hint err';
      hint.textContent = '⚠ 數量必須大於 0';
    } else {
      hint.className = 'qty-hint';
      hint.style.color = 'var(--sage2)';
      hint.textContent = '✓ 格式正確';
    }
  });

  /* ── 顯示訊息 ── */
  function showMsg(text, type) {
    const el = document.getElementById('form-msg');
    el.textContent = text;
    el.className = 'form-msg show ' + type;
  }
  function hideMsg() {
    document.getElementById('form-msg').className = 'form-msg';
  }

  /* ── 送出訂購 ── */
  async function submitOrder() {
    const quantity = document.getElementById('quantity').value.trim();
    const notes    = document.getElementById('notes').value.trim();
    const btn      = document.getElementById('btn-submit');

    if (!selectedItem) { showMsg('⚠ 請先搜尋並選擇文具', 'err'); return; }
    if (!quantity)      { showMsg('⚠ 請填寫數量', 'err'); return; }
    if (parseInt(quantity) <= 0) { showMsg('⚠ 數量必須大於 0', 'err'); return; }

    btn.disabled = true;
    showMsg('送出中…', 'ok');

    const timestamp = new Date().toLocaleString('zh-TW', { hour12: false });

    try {
      const body = new URLSearchParams({
        action:    'order_stationery',
        account:   account,
        name:      currentUserName,
        item:      selectedItem,
        quantity:  quantity,
        notes:     notes,
        timestamp: timestamp
      }).toString();

      const res  = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
        body
      });
      const data = await res.json();

      if (data.success || data.result === 'ok' || data.status === 'ok') {
        showMsg('✅ 登記成功！已記錄到 Google Sheets', 'ok');
        setTimeout(() => {
          clearSearch();
          hideMsg();
        }, 2500);
      } else {
        showMsg('⚠ ' + (data.error || data.message || '送出失敗，請稍後再試'), 'err');
      }
    } catch {
      showMsg('⚠ 連線失敗，請稍後再試', 'err');
    } finally {
      btn.disabled = false;
    }
  }

  /* ── 點擊外部關閉建議 ── */
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap') && !e.target.closest('.suggestions-box')) {
      document.getElementById('suggestions').classList.remove('open');
    }
  });
</script>
</body>
</html>
